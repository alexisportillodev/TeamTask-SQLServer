<section class="card">
  <header class="header">
    <h2>Tasks</h2>
    <div class="actions">
      <label class="filter">
        <span>Status</span>
        <select [value]="statusFilter" (change)="onFilterChange($event)">
          <option value="">All</option>
          <option value="0">Pending</option>
          <option value="1">In Progress</option>
          <option value="2">Done</option>
        </select>
      </label>
      <button type="button" class="btn btn-secondary" (click)="refresh()">Refresh</button>
    </div>
  </header>

  @if (list.length === 0) {
    <p class="muted">No tasks yet.</p>  
  } @else {
    <div class="table">
      <div class="row head">
        <div>Title</div>
        <div>User</div>
        <div>Status</div>
      </div>

      @for (t of list; track t.id) {
        <div class="row">
          <div class="title">
            <strong>{{ t.title }}</strong>
            @if (t.description) {
              <div class="muted small">{{ t.description }}</div>
            }
          </div>

          <div class="muted">
            {{ userLabel(t.userId) }}
          </div>

          <div>
            <select
              [ngModel]="t.status"
              (ngModelChange)="changeStatus(t.id, $event)"
              [class.pending]="t.status === 0"
              [class.progress]="t.status === 1"
              [class.done]="t.status === 2"
            >
              <option [ngValue]="0">Pending</option>
              <option [ngValue]="1">In Progress</option>
              <option [ngValue]="2">Done</option>
            </select>
          </div>
        </div>
      }
    </div>
  }
</section>
